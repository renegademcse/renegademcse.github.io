<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympic Bunker Coach</title>
<style>
:root {
  --gold: #c9a227;
  --gold-light: #e8c547;
  --dark: #0d0d0d;
  --dark2: #1a1a1a;
  --dark3: #242424;
  --dark4: #2e2e2e;
  --text: #e8e8e8;
  --text-dim: #888;
  --accent: #c9a227;
  --green: #2ecc71;
  --red: #e74c3c;
  --blue: #3498db;
  --orange: #e67e22;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
a { color: var(--gold); text-decoration: none; }

/* NAV */
#nav { background: var(--dark2); border-bottom: 2px solid var(--gold); display: flex; align-items: center; padding: 0 24px; height: 56px; gap: 8px; position: sticky; top: 0; z-index: 100; }
#nav .logo { font-size: 1.2rem; font-weight: 700; color: var(--gold); letter-spacing: 1px; margin-right: auto; }
#nav .logo span { color: var(--text); font-weight: 300; }
.nav-btn { background: none; border: none; color: var(--text-dim); padding: 6px 14px; cursor: pointer; border-radius: 4px; font-size: 0.85rem; transition: all .2s; }
.nav-btn:hover, .nav-btn.active { background: var(--dark4); color: var(--gold); }
#xp-bar-wrap { display: flex; align-items: center; gap: 8px; margin-left: 12px; }
#xp-label { font-size: 0.75rem; color: var(--gold); white-space: nowrap; }
#xp-track { width: 100px; height: 6px; background: var(--dark4); border-radius: 3px; overflow: hidden; }
#xp-fill { height: 100%; background: var(--gold); width: 0%; transition: width .5s; }

/* SCREENS */
.screen { display: none; padding: 28px 24px; max-width: 900px; margin: 0 auto; }
.screen.active { display: block; }

/* HOME */
.hero { text-align: center; padding: 40px 0 32px; }
.hero h1 { font-size: 2.4rem; color: var(--gold); letter-spacing: 2px; }
.hero p { color: var(--text-dim); margin-top: 8px; font-size: 1rem; }
.rank-badge { display: inline-block; margin-top: 16px; background: var(--dark3); border: 1px solid var(--gold); border-radius: 8px; padding: 8px 24px; font-size: 0.9rem; }
.rank-badge strong { color: var(--gold); }

.module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 24px; }
.module-card { background: var(--dark2); border: 1px solid var(--dark4); border-radius: 10px; padding: 20px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
.module-card:hover { border-color: var(--gold); transform: translateY(-2px); }
.module-card.locked { opacity: .5; cursor: not-allowed; }
.module-card .icon { font-size: 2rem; margin-bottom: 10px; }
.module-card h3 { font-size: 1rem; color: var(--gold); }
.module-card p { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; line-height: 1.4; }
.module-card .prog-bar { margin-top: 12px; height: 4px; background: var(--dark4); border-radius: 2px; }
.module-card .prog-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width .4s; }
.module-card .lock-icon { position: absolute; top: 12px; right: 12px; font-size: 0.8rem; color: var(--text-dim); }
.module-card .badge { position: absolute; top: 10px; right: 10px; background: var(--green); color: #000; font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 10px; }

/* LESSON */
#lesson-header { margin-bottom: 20px; }
#lesson-header h2 { color: var(--gold); font-size: 1.4rem; }
#lesson-header .meta { color: var(--text-dim); font-size: 0.8rem; margin-top: 4px; }
.lesson-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--dark4); margin-bottom: 20px; }
.ltab { background: none; border: none; color: var(--text-dim); padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent; font-size: 0.85rem; }
.ltab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* CONTENT blocks */
.content-block { margin-bottom: 20px; }
.tip-box { background: var(--dark3); border-left: 3px solid var(--gold); padding: 12px 16px; border-radius: 0 6px 6px 0; font-size: 0.88rem; line-height: 1.6; }
.tip-box strong { color: var(--gold); display: block; margin-bottom: 4px; }
.warn-box { background: var(--dark3); border-left: 3px solid var(--orange); padding: 12px 16px; border-radius: 0 6px 6px 0; font-size: 0.88rem; line-height: 1.6; }
.warn-box strong { color: var(--orange); display: block; margin-bottom: 4px; }
h3.section { color: var(--gold-light); font-size: 1rem; margin: 20px 0 8px; border-bottom: 1px solid var(--dark4); padding-bottom: 4px; }
ul.checklist { list-style: none; padding: 0; }
ul.checklist li { padding: 6px 0 6px 24px; position: relative; font-size: 0.88rem; color: var(--text); border-bottom: 1px solid var(--dark4); }
ul.checklist li::before { content: '✦'; position: absolute; left: 0; color: var(--gold); font-size: 0.7rem; top: 8px; }
p.body { font-size: 0.88rem; line-height: 1.7; color: #ccc; margin-bottom: 10px; }

/* DIAGRAM */
.diagram { background: var(--dark3); border: 1px solid var(--dark4); border-radius: 8px; padding: 16px; margin: 16px 0; }
.diagram canvas { display: block; margin: 0 auto; }
.diagram-label { text-align: center; font-size: 0.75rem; color: var(--text-dim); margin-top: 8px; }

/* DRILL */
.drill-card { background: var(--dark3); border: 1px solid var(--dark4); border-radius: 8px; padding: 18px; margin-bottom: 14px; }
.drill-card h4 { color: var(--gold); font-size: 0.95rem; margin-bottom: 6px; }
.drill-card p { font-size: 0.82rem; color: #bbb; line-height: 1.5; }
.drill-card .drill-meta { margin-top: 10px; display: flex; gap: 12px; flex-wrap: wrap; }
.drill-meta span { background: var(--dark4); border-radius: 4px; padding: 3px 10px; font-size: 0.75rem; color: var(--text-dim); }
.drill-meta span strong { color: var(--text); }
.complete-btn { margin-top: 12px; background: var(--dark4); border: 1px solid var(--gold); color: var(--gold); padding: 6px 18px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; transition: all .2s; }
.complete-btn:hover { background: var(--gold); color: #000; }
.complete-btn.done { background: var(--green); border-color: var(--green); color: #000; }

/* QUIZ */
.quiz-q { margin-bottom: 20px; }
.quiz-q p { font-size: 0.9rem; margin-bottom: 10px; font-weight: 500; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt { background: var(--dark3); border: 1px solid var(--dark4); border-radius: 6px; padding: 10px 14px; cursor: pointer; font-size: 0.85rem; transition: all .2s; text-align: left; color: var(--text); }
.quiz-opt:hover { border-color: var(--gold); }
.quiz-opt.correct { border-color: var(--green); background: rgba(46,204,113,.1); color: var(--green); }
.quiz-opt.wrong { border-color: var(--red); background: rgba(231,76,60,.1); color: var(--red); }
.quiz-feedback { margin-top: 8px; font-size: 0.8rem; padding: 8px; border-radius: 4px; display: none; }
.quiz-feedback.show { display: block; }
.quiz-feedback.ok { background: rgba(46,204,113,.1); color: var(--green); }
.quiz-feedback.fail { background: rgba(231,76,60,.1); color: var(--red); }
#quiz-submit { margin-top: 16px; background: var(--gold); color: #000; border: none; padding: 10px 28px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
#quiz-result { margin-top: 16px; padding: 14px; border-radius: 8px; display: none; font-size: 0.9rem; }
#quiz-result.pass { background: rgba(46,204,113,.15); border: 1px solid var(--green); color: var(--green); }
#quiz-result.fail { background: rgba(231,76,60,.15); border: 1px solid var(--red); color: var(--red); }

/* TRACKER */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--dark2); border: 1px solid var(--dark4); border-radius: 8px; padding: 16px; text-align: center; }
.stat-card .num { font-size: 2rem; font-weight: 700; color: var(--gold); }
.stat-card .lbl { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }
.session-form { background: var(--dark2); border: 1px solid var(--dark4); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
.session-form h3 { color: var(--gold); margin-bottom: 14px; font-size: 1rem; }
.form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
.form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 130px; }
.form-group label { font-size: 0.75rem; color: var(--text-dim); }
.form-group input, .form-group select, .form-group textarea { background: var(--dark3); border: 1px solid var(--dark4); color: var(--text); padding: 8px 10px; border-radius: 5px; font-size: 0.85rem; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--gold); }
.btn-gold { background: var(--gold); color: #000; border: none; padding: 9px 22px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.88rem; transition: opacity .2s; }
.btn-gold:hover { opacity: .85; }
.session-list { margin-top: 4px; }
.session-row { background: var(--dark2); border: 1px solid var(--dark4); border-radius: 6px; padding: 12px 16px; margin-bottom: 8px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.session-row .score { font-size: 1.3rem; font-weight: 700; color: var(--gold); }
.session-row .detail { font-size: 0.8rem; color: var(--text-dim); }
.session-row .note { font-size: 0.78rem; color: #999; flex: 1; }
.delete-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; }
.delete-btn:hover { color: var(--red); }

/* CHART */
#score-chart { width: 100%; height: 160px; background: var(--dark3); border: 1px solid var(--dark4); border-radius: 8px; margin-bottom: 20px; }

/* RULES */
.rule-card { background: var(--dark2); border-left: 3px solid var(--blue); border-radius: 0 8px 8px 0; padding: 14px 18px; margin-bottom: 12px; }
.rule-card h4 { color: var(--blue); font-size: 0.9rem; margin-bottom: 6px; }
.rule-card p { font-size: 0.82rem; color: #bbb; line-height: 1.5; }

/* MENTAL */
.mental-tool { background: var(--dark2); border: 1px solid var(--dark4); border-radius: 8px; padding: 18px; margin-bottom: 14px; }
.mental-tool h4 { color: var(--gold); font-size: 0.95rem; margin-bottom: 8px; }
.mental-tool p { font-size: 0.82rem; color: #bbb; line-height: 1.5; margin-bottom: 10px; }
.breath-btn { background: var(--dark3); border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
#breath-text { font-size: 1.5rem; text-align: center; color: var(--gold); padding: 20px; display: none; font-weight: 700; }

/* BACK */
.back-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
.back-btn:hover { color: var(--gold); }

/* TOAST */
#toast { position: fixed; bottom: 24px; right: 24px; background: var(--gold); color: #000; padding: 10px 20px; border-radius: 8px; font-weight: 700; font-size: 0.88rem; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
#toast.show { opacity: 1; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--dark); }
::-webkit-scrollbar-thumb { background: var(--dark4); border-radius: 3px; }

@media (max-width: 600px) {
  #nav .logo { font-size: 1rem; }
  .hero h1 { font-size: 1.6rem; }
  .screen { padding: 16px; }
}
</style>
</head>
<body>

<nav id="nav">
  <div class="logo">BUNKER <span>COACH</span></div>
  <button class="nav-btn active" onclick="showScreen('home')">Home</button>
  <button class="nav-btn" onclick="showScreen('tracker')">Tracker</button>
  <button class="nav-btn" onclick="showScreen('rules')">Rules</button>
  <div id="xp-bar-wrap">
    <div id="xp-label">Rank: <span id="rank-name">Novice</span></div>
    <div id="xp-track"><div id="xp-fill"></div></div>
  </div>
</nav>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="hero">
    <h1>OLYMPIC BUNKER COACH</h1>
    <p>Structured path from first shot to international podium</p>
    <div class="rank-badge">Current Rank: <strong id="home-rank">Novice</strong> &nbsp;|&nbsp; XP: <strong id="home-xp">0</strong></div>
  </div>
  <div class="module-grid" id="module-grid"></div>
</div>

<!-- LESSON -->
<div id="screen-lesson" class="screen">
  <button class="back-btn" onclick="showScreen('home')">← Back to Modules</button>
  <div id="lesson-header"></div>
  <div class="lesson-tabs" id="lesson-tabs"></div>
  <div id="lesson-content"></div>
</div>

<!-- TRACKER -->
<div id="screen-tracker" class="screen">
  <h2 style="color:var(--gold);margin-bottom:20px">Score Tracker</h2>
  <div class="stat-grid" id="stat-grid"></div>
  <canvas id="score-chart"></canvas>
  <div class="session-form">
    <h3>Log a Session</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>Targets Shot</label>
        <input type="number" id="f-targets" min="25" max="200" placeholder="125">
      </div>
      <div class="form-group">
        <label>Hits</label>
        <input type="number" id="f-hits" min="0" max="200" placeholder="95">
      </div>
      <div class="form-group">
        <label>Stage</label>
        <select id="f-stage">
          <option>Practice</option>
          <option>Club Comp</option>
          <option>Regional</option>
          <option>National</option>
          <option>International</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>Notes (conditions, focus areas, etc.)</label>
        <input type="text" id="f-notes" placeholder="Wind from right, worked on station 3 angles...">
      </div>
    </div>
    <button class="btn-gold" onclick="logSession()">Log Session</button>
  </div>
  <div class="session-list" id="session-list"></div>
</div>

<!-- RULES -->
<div id="screen-rules" class="screen">
  <h2 style="color:var(--gold);margin-bottom:20px">Olympic Bunker Rules & Format</h2>
  <div id="rules-content"></div>
</div>

<div id="toast">+XP Earned!</div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let state = JSON.parse(localStorage.getItem('bunker_state') || 'null') || {
  xp: 0,
  completedDrills: {},
  quizScores: {},
  moduleProgress: {},
  sessions: []
};
function saveState() { localStorage.setItem('bunker_state', JSON.stringify(state)); }

const RANKS = [
  { name: 'Novice', xp: 0 },
  { name: 'Shooter', xp: 200 },
  { name: 'Club Shooter', xp: 500 },
  { name: 'Regional', xp: 1000 },
  { name: 'National', xp: 2000 },
  { name: 'International', xp: 3500 },
  { name: 'Olympic', xp: 5000 },
];
function getRank() {
  let r = RANKS[0];
  for (let rank of RANKS) { if (state.xp >= rank.xp) r = rank; }
  return r;
}
function getNextRank() {
  const idx = RANKS.findIndex(r => r.name === getRank().name);
  return RANKS[idx + 1] || null;
}
function updateXPBar() {
  const rank = getRank();
  const next = getNextRank();
  document.getElementById('rank-name').textContent = rank.name;
  document.getElementById('home-rank').textContent = rank.name;
  document.getElementById('home-xp').textContent = state.xp;
  if (next) {
    const pct = ((state.xp - rank.xp) / (next.xp - rank.xp)) * 100;
    document.getElementById('xp-fill').style.width = pct + '%';
    document.getElementById('xp-label').textContent = `${rank.name} → ${next.name}`;
  } else {
    document.getElementById('xp-fill').style.width = '100%';
    document.getElementById('xp-label').textContent = 'OLYMPIC ★';
  }
}
function addXP(amount, label) {
  state.xp += amount;
  saveState();
  updateXPBar();
  showToast(`+${amount} XP — ${label}`);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════════
// MODULES DATA
// ═══════════════════════════════════════════════════════
const MODULES = [
  {
    id: 'intro',
    icon: '🎯',
    title: 'Discipline Overview',
    desc: 'Understand what Olympic Bunker is, the layout, and what separates it from other shotgun sports.',
    unlockAt: 0,
    drills: 2,
    quizLen: 5
  },
  {
    id: 'stance',
    icon: '🦶',
    title: 'Stance & Setup',
    desc: 'Foundation of every shot. Foot position, weight distribution, and body alignment.',
    unlockAt: 0,
    drills: 3,
    quizLen: 4
  },
  {
    id: 'mount',
    icon: '🔫',
    title: 'Gun Mount & Hold Point',
    desc: 'Pre-mount technique, cheek weld, hold point selection per station.',
    unlockAt: 100,
    drills: 4,
    quizLen: 5
  },
  {
    id: 'visual',
    icon: '👁️',
    title: 'Visual System',
    desc: 'Hard focus, soft focus, target acquisition speed and the visual "cone".',
    unlockAt: 200,
    drills: 3,
    quizLen: 4
  },
  {
    id: 'technique',
    icon: '💥',
    title: 'Shooting Technique',
    desc: 'Swing, lead, trigger pull, follow-through — station by station breakdown.',
    unlockAt: 400,
    drills: 5,
    quizLen: 6
  },
  {
    id: 'angles',
    icon: '📐',
    title: 'Reading Targets & Angles',
    desc: '15 target presentations per station. Learning to read and react to each angle.',
    unlockAt: 700,
    drills: 4,
    quizLen: 5
  },
  {
    id: 'mental',
    icon: '🧠',
    title: 'Mental Game',
    desc: 'Pre-shot routine, reset after misses, competition pressure, and focus cues.',
    unlockAt: 1000,
    drills: 3,
    quizLen: 4
  },
  {
    id: 'competition',
    icon: '🏆',
    title: 'Competition Preparation',
    desc: 'Warm-up protocol, equipment checks, squad management, and peak performance.',
    unlockAt: 1800,
    drills: 3,
    quizLen: 5
  }
];

// ═══════════════════════════════════════════════════════
// LESSON CONTENT
// ═══════════════════════════════════════════════════════
const LESSON_CONTENT = {

intro: {
  learn: `
    <h3 class="section">What is Olympic Bunker?</h3>
    <p class="body">Olympic Bunker (also called Olympic Trap or Bunker Trap) is one of the three Olympic shotgun disciplines, alongside Skeet and Double Trap. It is widely considered the most technically demanding shotgun sport due to the speed, unpredictability, and variety of target presentations.</p>
    <p class="body">Targets are launched from a bunker (trench) sunk into the ground in front of the shooting line. Each station has three machines capable of throwing targets at different horizontal angles and varying elevations. The shooter does not know which angle or height will be presented until the target is in flight.</p>
    <div class="diagram">
      <canvas id="c-field" width="480" height="200"></canvas>
      <div class="diagram-label">Top view: 5 shooting stations, bunker with 15 machines (3 per station)</div>
    </div>
    <h3 class="section">The Field Layout</h3>
    <ul class="checklist">
      <li>5 shooting stations spaced 2.5m apart on a straight line</li>
      <li>Bunker located 15m in front of the shooting line</li>
      <li>15 machines in total — 3 assigned to each station</li>
      <li>Targets travel a minimum of 76 meters from the bunker</li>
      <li>Angles range from extreme left to extreme right (±45°) and varying elevation</li>
    </ul>
    <h3 class="section">Competition Format</h3>
    <ul class="checklist">
      <li>Qualification: 125 targets (5 rounds × 25 targets, rotating stations)</li>
      <li>Each shooter fires at one target per station before the squad rotates</li>
      <li>Semi-final: 50 targets (top 6 qualify)</li>
      <li>Final: 50 targets with elimination rounds (top 6 shooters)</li>
      <li>Scoring: 1 point per hit, 0 per miss — maximum 125 in qualification</li>
    </ul>
    <div class="tip-box"><strong>Coach's Note</strong>One key difference from American Trap: in Olympic Bunker you shoot ONE shot at a time at a fresh single — not two shots. Efficiency and certainty on the first shot is everything.</div>
    <h3 class="section">What Makes it Hard</h3>
    <p class="body">Unlike American Trap where angles are limited, Olympic Bunker machines throw targets up to 45° left or right and at varying heights. The combination of uncertainty, speed (targets move at ~100 km/h), and the requirement for a reliable first-shot kill makes this the pinnacle of clay target shooting.</p>
    <div class="warn-box"><strong>Common Beginner Mistake</strong>Trying to aim at the target like a rifle. Olympic Bunker is a reactive sport — the gun must flow with the target, not stop on it.</div>
  `,
  drills: [
    {
      id: 'intro_d1',
      title: 'Field Walk-Through',
      difficulty: 'Beginner',
      location: 'At the range',
      time: '20 min',
      desc: `Walk the full layout before ever shooting. Stand at each of the 5 stations. Face the bunker. Note the sight line down the field. Observe where targets land at each angle. Ask the trapper or club coach to throw a few unloaded to watch flight paths. Identify the far orange marker stakes — your reference for target distance. Build a spatial map of the field in your mind before your first live shot.`
    },
    {
      id: 'intro_d2',
      title: 'Machine Angle Observation',
      difficulty: 'Beginner',
      location: 'Viewing area',
      time: '15 min',
      desc: `Watch an experienced squad shoot a full round of 25. At each station, track whether each target goes left, center, or right. Notice the height variation. Count roughly how often extreme angles appear versus straight-ish angles. This builds your mental model of what randomization feels like and eliminates surprises on your first round.`
    }
  ],
  quiz: [
    { q: 'How many machines are in the bunker?', opts: ['5','10','15','25'], correct: 2, exp: '3 machines per station × 5 stations = 15 machines total.' },
    { q: 'What is the minimum distance a target must travel from the bunker?', opts: ['50m','65m','76m','100m'], correct: 2, exp: 'ISSF rules specify 76 metres minimum target distance.' },
    { q: 'How many targets are shot in Olympic Bunker qualification?', opts: ['75','100','125','150'], correct: 2, exp: '5 rounds × 25 targets = 125 targets in qualification.' },

stance: {
  learn: `
    <h3 class="section">Why Stance is Everything</h3>
    <p class="body">Your stance is the platform for every shot. An inconsistent stance creates inconsistent results — no amount of gun fit, visual skill, or mental toughness compensates for a poor foundation. In Olympic Bunker, you need a stance that allows 90° of free lateral movement while maintaining a natural point of aim down the field centerline.</p>
    <h3 class="section">Foot Position</h3>
    <ul class="checklist">
      <li>Feet shoulder-width apart — no wider, no narrower</li>
      <li>Lead foot (left for right-handed) points toward the bunker at roughly 30–45°</li>
      <li>Rear foot perpendicular or slightly angled rearward</li>
      <li>Weight: 60–70% on the lead foot</li>
      <li>Knees slightly bent — never locked</li>
    </ul>
    <div class="tip-box"><strong>Station Adjustment</strong>For stations 1 and 5, shift foot direction slightly toward the extreme angle side of your station. Station 1 shooters see many hard-left targets; your stance must accommodate that swing without hip restriction.</div>
    <h3 class="section">Body Alignment</h3>
    <p class="body">Your body should be "pre-loaded" slightly toward the expected center of travel. This does NOT mean aiming — it means positioning your skeletal structure so your natural point of aim is roughly center-field from your station. This reduces the amount of muscle you need to apply during the swing.</p>
    <ul class="checklist">
      <li>Hips square toward the bunker at start</li>
      <li>Shoulders level — no drooping of the gun shoulder</li>
      <li>Lean forward from the ankles — NOT the waist</li>
      <li>Chin down, neck forward over the gun</li>
      <li>Upper body leans ~5–10° forward — aggressive but balanced</li>
    </ul>
    <h3 class="section">Weight Transfer During the Swing</h3>
    <p class="body">As you swing to an extreme angle, weight transfers slightly onto the front foot for outside targets and off-loads naturally for inside targets. Do NOT allow the rear heel to lift off the ground — this is a sign you're over-swinging and losing control.</p>
    <div class="warn-box"><strong>Common Error: The Pivot Lean</strong>Many shooters lean laterally (sideways) rather than pivoting from the hip. If you find yourself losing cheek contact on wide angle targets, this is usually the cause. The gun comes to you — you do not reach for the gun.</div>
    <h3 class="section">Station-by-Station Stance Notes</h3>
    <ul class="checklist">
      <li><strong>Station 1:</strong> Body angled right of center. Expect targets to go hard left — most challenging station.</li>
      <li><strong>Station 2:</strong> Slight right bias. Many moderate left angles.</li>
      <li><strong>Station 3:</strong> Center station. Most neutral stance. Angles are balanced left/right.</li>
      <li><strong>Station 4:</strong> Slight left bias. Mirror of station 2.</li>
      <li><strong>Station 5:</strong> Body angled left of center. Hard right targets dominate.</li>
    </ul>
  `,

mount: {
  learn: `
    <h3 class="section">Pre-Mount vs. Mounted Start</h3>
    <p class="body">Olympic Bunker uses the <strong>pre-mount</strong> style: the gun is mounted to the shoulder and cheek before the target is called. The shooter calls "Pull" with the gun already fully mounted. This differs from Sporting Clays and some other disciplines where the mount happens after target launch.</p>
    <p class="body">Because the gun is already mounted, your preparation time is entirely devoted to visual readiness — getting your eyes to the right place, at the right focus, at the right moment.</p>
    <h3 class="section">The Mount Itself</h3>
    <ul class="checklist">
      <li>Bring the stock firmly to the cheek first, then the shoulder meets the gun</li>
      <li>Cheek pressure: firm, repeatable — like a weld, not a rest</li>
      <li>Comb contact point must be identical every single mount</li>
      <li>Shoulder pocket: the gun nestles in the hollow below the collarbone — never on the arm</li>
      <li>Grip: firm but not white-knuckle — the trigger hand squeezes, the fore-end hand guides</li>
      <li>Elbows: lead elbow up (45°+) to create the shoulder pocket; trigger elbow slightly down</li>
    </ul>
    <div class="tip-box"><strong>The Cheek Weld Rule</strong>Every miss that cannot be explained by swing or visual error should be traced back to the cheek weld first. Inconsistent mounting is the single largest source of unexplained misses in developing shooters.</div>
    <h3 class="section">Hold Point Selection</h3>
    <p class="body">Your hold point is where the muzzle sits when you call for the target. It is NOT where you intend to shoot — it is the starting position for your reactive swing. Getting the hold point right reduces reaction time and builds consistent leads.</p>
    <ul class="checklist">
      <li><strong>Height:</strong> Muzzle sits 1–2m above the bunker wall — never higher. The target must appear below your muzzle, not above it.</li>
      <li><strong>Lateral position:</strong> Roughly center of your station's three machine arc</li>
      <li><strong>Station 1:</strong> Hold slightly right of center to avoid masking left targets</li>
      <li><strong>Station 5:</strong> Hold slightly left of center for the same reason</li>
      <li><strong>Station 3:</strong> Dead center hold works well due to balanced angles</li>
    </ul>
    <div class="warn-box"><strong>Hold Point Too High</strong>If your muzzle is above the target line at call, you must swing DOWN and then across — this double movement destroys timing. Lower your hold point until targets always appear below the muzzle.</div>
    <h3 class="section">The Call Sequence</h3>
    <p class="body">Every call should follow the same sequence, every time. Pre-shot routine is covered in detail in the Mental Game module, but from a technical standpoint:</p>
    <ul class="checklist">
      <li>Stance confirmed → gun mounted → hold point set → eyes hard focused on the traphouse window → CALL</li>
      <li>From call to shot: typically 0.8–1.2 seconds for elite shooters</li>
      <li>Do not call until your eyes are ready — the machine will wait; your focus cannot be rushed</li>
    </ul>
  `,

visual: {
  learn: `
    <h3 class="section">The Visual System is the Shot</h3>
    <p class="body">More than any other discipline, Olympic Bunker is won or lost in the visual system. You have approximately 0.3 seconds from target emergence to reading enough information to commit your swing. The difference between a hit and a miss is often not the trigger pull — it is where your eyes were and what they were focused on.</p>
    <h3 class="section">Hard Focus vs. Soft Focus</h3>
    <p class="body"><strong>Soft focus</strong> is a wide, relaxed gaze across the trap house window. You are not looking at a specific point — you are looking AT the window as a wide zone. This is your state between shots and as you call for the target.</p>
    <p class="body"><strong>Hard focus</strong> is the instant the target emerges — your eyes lock on to the front edge of the clay. Not the back, not the middle — the leading edge. This is what enables you to read angle, speed, and height in the first 20 meters of flight.</p>
    <div class="tip-box"><strong>Coach's Rule</strong>If you are looking at the muzzle when you fire, you will miss behind almost every time. The gun lives in your peripheral vision. The target lives in your fovea.</div>
    <h3 class="section">The Visual Cone</h3>
    <p class="body">Think of your gaze as a cone originating from your eyes. At soft focus, the cone is wide — covering the entire trap house window. When the target appears, the cone narrows instantly and locks onto the clay. Your job is to transition from wide cone to narrow cone in under 0.2 seconds.</p>
    <ul class="checklist">
      <li>Soft focus: broad awareness, no tension in the eyes</li>
      <li>Target emerges: cone narrows, hard lock on leading edge</li>
      <li>Swing begins: eyes pull the gun — the muzzle follows your focus</li>
      <li>Through shot: eyes stay ahead of the target, never stop</li>
    </ul>
    <h3 class="section">The Look Zone</h3>
    <p class="body">The look zone is where you direct your soft focus before calling. It is NOT the trap house itself — it is approximately 5–8 meters in front of the bunker, at about trap height. This is where the target will become readable.</p>
    <ul class="checklist">
      <li>Look too close (at the trap house slit): target exits too fast, reaction is scrambled</li>
      <li>Look too far: target has already established its angle before you pick it up — always playing catch-up</li>
      <li>Optimal look zone: 5–8m in front of bunker, just above trap height</li>
    </ul>
    <div class="warn-box"><strong>Visual Fatigue</strong>Elite shooters monitor visual fatigue closely. In a 125-target qualification, maintaining hard focus on every target is exhausting. Blinking deliberately between shots and practicing "soft reset" gazes between presentations prevents the glazed unfocused state that causes runs of misses late in a round.</div>
    <h3 class="section">Reading the Target in Flight</h3>
    <p class="body">Within the first 10–15 meters, a skilled shooter reads: (1) horizontal angle, (2) elevation, (3) speed. This reading happens below the conscious level once trained — it becomes instinct. Early in your development, name what you see: "hard left, rising" or "straight, flat" — this builds neural encoding of target types.</p>
  `,

    {
      id: 'visual_d1',
      title: 'Observation Round',
      difficulty: 'Beginner',

    },

      id: 'visual_d2',

      difficulty: 'Intermediate',
      location: 'Range',

      desc: `Stand at station 3. Without shooting, call for targets and practice picking up the target in the look zone 5–8m from the bunker. If you feel like you are reacting rather than reading, your look zone is too close. If targets seem to arrive already moving fast and committed, you are looking too far. Adjust until you feel you can name the angle (left/straight/right) within the first 5 meters of flight. Do this for 10–15 targets before live fire.`
    },
    {
      id: 'visual_d3',
      title: 'Muzzle Blur Check',
      difficulty: 'Advanced',

      desc: `During a live session, with a training partner watching, have them call out "bead" every time they observe your eyes flicking to the muzzle bead or barrel. Count tallies per round. Elite shooters have 0–2 muzzle checks per 25 targets. More than 5 indicates a checking habit that destroys leads. Drill fix: mentally say "orange" (the target color) from emergence through follow-through to keep visual commitment locked on the clay.`
    }

  quiz: [
    { q: 'What is "hard focus" in Olympic Bunker?', opts: ['Looking at the gun barrel','Looking at the leading edge of the clay','Staring intensely at the trap house','Focusing on a point 50m downrange'], correct: 1, exp: 'Hard focus locks on the front (leading) edge of the clay as soon as it emerges. This gives maximum angle and speed reading information.' },
    { q: 'Where is the optimal look zone before calling?', opts: ['At the trap house slit','15–20m in front of bunker','5–8m in front of bunker at trap height','On the far horizon'], correct: 2, exp: '5–8m in front of the bunker gives optimal time to read the target angle without the disorienting speed of a target emerging right from the house.' },
    { q: 'What is "soft focus" used for?', opts: ['Aiming precisely at the bunker','A relaxed wide-field gaze before and between shots','Looking at a distant reference point','Checking the gun barrel is aligned'], correct: 1, exp: 'Soft focus is a wide, relaxed gaze over the trap house zone. It keeps the visual system fresh and ready to pick up any angle the target takes.' },
    { q: 'What does a muzzle-checking habit typically cause?', opts: ['Better accuracy','Missing behind the target','Missing in front of the target','No effect on accuracy'], correct: 1, exp: 'When eyes drop to the muzzle mid-shot, the gun decelerates or stops swinging. The target overtakes the pattern — misses happen behind.' },

technique: {
  learn: `
    <h3 class="section">The Mechanics of a Kill Shot</h3>
    <p class="body">Olympic Bunker technique is built on a simple principle: the gun must always be accelerating through the target. A stopped or decelerating gun pattern passes behind fast-moving clays. Every component of technique — swing, lead, trigger, follow-through — serves this one idea.</p>
    <h3 class="section">The Swing</h3>
    <p class="body">Olympic Bunker uses a <strong>maintained lead</strong> or <strong>swing-through</strong> approach depending on the shooter and coach. The majority of elite coaches teach <strong>swing-through from behind</strong> — starting the muzzle behind the target, accelerating through it, and pulling the trigger as the muzzle overtakes the target and builds lead.</p>
    <ul class="checklist">
      <li>Eyes pick up target → body starts rotating immediately</li>
      <li>Gun moves from hold point toward target, picking up the line</li>
      <li>Muzzle comes from behind the target and accelerates through</li>
      <li>Trigger fires as lead develops — not a conscious measurement</li>
      <li>Follow-through continues the swing 30cm past the break point</li>
    </ul>
    <div class="tip-box"><strong>Lead is a Feeling, Not a Calculation</strong>You cannot consciously calculate lead at 100 km/h. Elite shooters develop an instinctive feel for "enough lead" through repetition. Early training should focus on timing (swinging through) rather than measuring barrel gaps.</div>
    <h3 class="section">The Trigger Pull</h3>
    <p class="body">The trigger should be a subconscious response to visual confirmation — "I see the right picture, the finger fires." Not: "I think I have enough lead so I will now press the trigger." That cognitive loop adds 0.3 seconds and means you are decelerating as you shoot.</p>
    <ul class="checklist">
      <li>Trigger finger rests in natural position — never forced</li>
      <li>Pull is a smooth, increasing pressure — no jab or snatch</li>
      <li>Fire decision is visual, not calculated</li>
      <li>Second trigger (if gun is an O/U) is never used in Olympic Bunker — one shot per target</li>
    </ul>
    <h3 class="section">Station-by-Station Technique Notes</h3>
    <ul class="checklist">
      <li><strong>Station 1:</strong> Hard left angles require the fastest swing of any station. Weight must transfer aggressively to front foot. Never rush the call — but commit instantly once target is read.</li>
      <li><strong>Station 2:</strong> Moderate angles dominate. Develop trust in the swing — this station rewards smooth mechanics.</li>
      <li><strong>Station 3:</strong> Center station. Straight targets can be deceptively fast — do not hold back on follow-through for "easy" straights.</li>
      <li><strong>Station 4:</strong> Mirror of station 2. Key fault here: over-compensating for right angles and getting lazy on left presentations.</li>
      <li><strong>Station 5:</strong> Hard right angles. Same demands as station 1, mirrored. Right-handed shooters often find hard rights at station 5 more difficult because the natural shoulder rotation works against them.</li>
    </ul>
    <h3 class="section">Follow-Through</h3>
    <p class="body">Follow-through is not optional. It is what prevents the gun from stopping at the moment of trigger pull. The brain's natural tendency after committing to the shot is to stop moving — follow-through overrides this. Keep swinging hard for 30 cm past where the target breaks. If you feel the gun stop at the trigger pull, your follow-through is gone.</p>
    <div class="warn-box"><strong>Stopping on the Bird</strong>The most common miss in the sport. The shooter "aims" at the target — the swing stops — the trigger fires — the bird flies through the pattern. Always swing through, never stop on it.</div>
  `,

  quiz: [
    { q: 'What swing method do most elite Olympic Bunker coaches teach?', opts: ['Stop-and-shoot (snap shooting)','Sustained lead from front','Swing-through from behind','Random based on target angle'], correct: 2, exp: 'Swing-through from behind: start behind the target, accelerate through it, fire as the lead develops. This prevents stopping on the bird.' },
    { q: 'What does "stopping on the bird" cause?', opts: ['A clean break just behind the target','The pattern to pass in front of the target','The pattern to pass behind the target','No effect — it is a myth'], correct: 2, exp: 'If the gun stops at trigger pull, the shot column passes behind the still-moving target. This is the most common miss type in the sport.' },

angles: {
  learn: `
    <h3 class="section">The 15-Machine System</h3>
    <p class="body">Each station has 3 machines programmed to throw specific angles. The exact settings vary by club and competition, but the ISSF defines angle ranges. Understanding the probability distribution at each station — which machines throw which way — helps you prepare your body before calling, even though you cannot know which specific machine will fire.</p>
    <div class="tip-box"><strong>Key Insight</strong>You cannot predict which machine will fire, but you CAN know: (1) the range of angles possible from your station, (2) which angles are statistically more frequent, (3) how to classify a target within its first 5 meters of flight. This knowledge converts uncertainty into informed reaction.</div>
    <h3 class="section">The Three Angle Categories</h3>
    <ul class="checklist">
      <li><strong>Going Away (Straight):</strong> Target angles within ~15° of center. These appear to accelerate straight away. The most common miss is behind — treat these as fast, not easy.</li>
      <li><strong>Going Out (Moderate Angle):</strong> 15–35° horizontal. These are the "bread and butter" targets. Most of your rounds will be dominated by these.</li>
      <li><strong>Extreme Angle:</strong> 35–45°. These require maximum rotation and the most decisive commitment. Hesitation on extreme angles almost always results in a miss.</li>
    </ul>

mental: {

    <h3 class="section">The Mental Game is a Skill</h3>
    <p class="body">Every shooter eventually reaches a ceiling where technique is sufficient to shoot very high scores in training but performance drops in competition. This ceiling is mental, not physical. The mental game — pre-shot routine, pressure management, reset protocols, and focus cues — is trainable and is as important as any physical skill.</p>
    <h3 class="section">Pre-Shot Routine</h3>
    <p class="body">The pre-shot routine is a repeatable sequence of physical and mental actions you perform before every single call. Its purpose is to bring you to a consistent physiological and psychological state — the same state that produces great shots in training.</p>

      <li><strong>Step to station:</strong> physical deliberateness — set feet, not rushed</li>

      <li><strong>Mount:</strong> gun to cheek, hold point set</li>
      <li><strong>Breath:</strong> exhale 60%, let breath settle</li>
      <li><strong>Eyes:</strong> move to look zone, achieve soft focus on trap window</li>
      <li><strong>Cue word (optional):</strong> one word trigger — "smooth", "orange", "through"</li>
      <li><strong>CALL</strong></li>
    </ul>
    <div class="tip-box"><strong>Timing Your Routine</strong>Elite shooters' pre-shot routines typically run 4–8 seconds. Too fast = physical shortcuts. Too slow = overthinking and eye fatigue. Time yours in training. Find your natural tempo and protect it in competition.</div>
    <h3 class="section">Resetting After a Miss</h3>
    <p class="body">What you do in the 3 seconds after a miss determines whether it becomes one miss or a run of misses. High performers have a defined reset protocol. Low performers react emotionally — and the next shot pays for it.</p>

    <h3 class="section">Competition Focus Cues</h3>

      <li>Breathing protocol: use box breathing (4 counts in, 4 hold, 4 out) between stations</li>
      <li>Physical release: roll shoulders, shake hands loose between stations to prevent muscle tension accumulation</li>
    </ul>

// ═══════════════════════════════════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  const btns = document.querySelectorAll('.nav-btn');
  btns.forEach(b => { if (b.textContent.toLowerCase().includes(name === 'home' ? 'home' : name === 'tracker' ? 'tracker' : name === 'rules' ? 'rules' : '')) b.classList.add('active'); });
  if (name === 'tracker') renderTracker();
  if (name === 'rules') renderRules();
  if (name === 'home') renderModules();
}

// ═══════════════════════════════════════════════════════
// MODULES
// ═══════════════════════════════════════════════════════
function getModuleProgress(id) {
  const mod = MODULES.find(m => m.id === id);
  if (!mod) return 0;
  const content = LESSON_CONTENT[id];
  let done = 0, total = 0;
  if (content) {
    total = content.drills.length + 1; // drills + quiz
    content.drills.forEach(d => { if (state.completedDrills[d.id]) done++; });
    if (state.quizScores[id] >= 70) done++;
  }
  return total ? Math.round((done / total) * 100) : 0;
}

function renderModules() {
  const grid = document.getElementById('module-grid');
  grid.innerHTML = '';
  MODULES.forEach(mod => {
    const locked = state.xp < mod.unlockAt;
    const pct = getModuleProgress(mod.id);
    const complete = pct === 100;
    const card = document.createElement('div');
    card.className = 'module-card' + (locked ? ' locked' : '');
    card.innerHTML = `
      <div class="icon">${mod.icon}</div>
      ${complete ? '<div class="badge">DONE</div>' : locked ? '<div class="lock-icon">🔒 ' + mod.unlockAt + ' XP</div>' : ''}
      <h3>${mod.title}</h3>
      <p>${mod.desc}</p>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    `;
    if (!locked) card.onclick = () => openLesson(mod.id);
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════
// LESSON
// ═══════════════════════════════════════════════════════
let currentLesson = null;

function openLesson(id) {
  currentLesson = id;
  const mod = MODULES.find(m => m.id === id);
  const content = LESSON_CONTENT[id];
  showScreen('lesson');

  document.getElementById('lesson-header').innerHTML = `
    <h2>${mod.icon} ${mod.title}</h2>
    <div class="meta">${content.drills.length} drills &nbsp;·&nbsp; ${content.quiz.length} quiz questions &nbsp;·&nbsp; Progress: ${getModuleProgress(id)}%</div>
  `;

  const tabs = [
    { id: 'learn', label: '📖 Learn' },
    { id: 'drills', label: '🏋️ Drills' },
    { id: 'quiz', label: '❓ Quiz' },
  ];

  document.getElementById('lesson-tabs').innerHTML = tabs.map((t, i) =>
    `<button class="ltab ${i === 0 ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');

  document.getElementById('lesson-content').innerHTML = `
    <div id="tab-learn" class="tab-pane active">${content.learn}</div>
    <div id="tab-drills" class="tab-pane">${renderDrills(content.drills)}</div>
    <div id="tab-quiz" class="tab-pane">${renderQuiz(id, content.quiz)}</div>
  `;

  // draw field diagram if needed
  if (id === 'intro') setTimeout(drawField, 50);
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.ltab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');
  document.querySelectorAll('.ltab').forEach(b => { if (b.textContent.toLowerCase().includes(tabId === 'learn' ? 'learn' : tabId === 'drills' ? 'drill' : 'quiz')) b.classList.add('active'); });
}

function renderDrills(drills) {
  return drills.map(d => {
    const done = !!state.completedDrills[d.id];
    return `
    <div class="drill-card">
      <h4>${d.title}</h4>
      <p>${d.desc}</p>
      <div class="drill-meta">
        <span><strong>Level:</strong> ${d.difficulty}</span>
        <span><strong>Where:</strong> ${d.location}</span>
        <span><strong>Time:</strong> ${d.time}</span>
      </div>
      <button class="complete-btn ${done ? 'done' : ''}" onclick="completeDrill('${d.id}', this)">
        ${done ? '✓ Completed' : 'Mark Complete'}
      </button>
    </div>`;
  }).join('');
}

function completeDrill(drillId, btn) {
  if (state.completedDrills[drillId]) return;
  state.completedDrills[drillId] = true;
  saveState();
  btn.textContent = '✓ Completed';
  btn.classList.add('done');
  addXP(25, 'Drill completed');
  updateModuleHeader();
}

function updateModuleHeader() {
  if (!currentLesson) return;
  const mod = MODULES.find(m => m.id === currentLesson);
  document.getElementById('lesson-header').querySelector('.meta').textContent =
    `${LESSON_CONTENT[currentLesson].drills.length} drills · ${LESSON_CONTENT[currentLesson].quiz.length} quiz questions · Progress: ${getModuleProgress(currentLesson)}%`;
}

// ═══════════════════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════════════════
function renderQuiz(moduleId, questions) {
  const prev = state.quizScores[moduleId];
  const prevHtml = prev !== undefined ? `<div style="margin-bottom:12px;font-size:.82rem;color:var(--text-dim)">Previous best: <strong style="color:var(--gold)">${prev}%</strong></div>` : '';
  const qs = questions.map((q, i) => `
    <div class="quiz-q" id="qq-${moduleId}-${i}">
      <p>${i + 1}. ${q.q}</p>
      <div class="quiz-options">
        ${q.opts.map((o, j) => `<button class="quiz-opt" onclick="selectOpt(this,'${moduleId}',${i},${j})">${o}</button>`).join('')}
      </div>
      <div class="quiz-feedback" id="qf-${moduleId}-${i}">${q.exp}</div>
    </div>
  `).join('');
  return `
    ${prevHtml}
    <form id="quiz-form-${moduleId}">
      ${qs}
      <button type="button" id="quiz-submit" onclick="submitQuiz('${moduleId}')">Submit Answers</button>
      <div id="quiz-result"></div>
    </form>`;
}

const quizAnswers = {};
function selectOpt(btn, modId, qIdx, optIdx) {
  const q = btn.closest('.quiz-q');
  q.querySelectorAll('.quiz-opt').forEach(b => b.classList.remove('selected'));
  btn.style.borderColor = 'var(--gold)';
  if (!quizAnswers[modId]) quizAnswers[modId] = {};
  quizAnswers[modId][qIdx] = optIdx;
}

function submitQuiz(moduleId) {
  const content = LESSON_CONTENT[moduleId];
  const answers = quizAnswers[moduleId] || {};
  let correct = 0;
  content.quiz.forEach((q, i) => {
    const selected = answers[i];
    const qq = document.getElementById(`qq-${moduleId}-${i}`);
    const feedback = document.getElementById(`qf-${moduleId}-${i}`);
    qq.querySelectorAll('.quiz-opt').forEach((b, j) => {
      if (j === q.correct) b.classList.add('correct');
      if (selected === j && j !== q.correct) b.classList.add('wrong');
    });
    feedback.classList.add('show');
    feedback.classList.add(selected === q.correct ? 'ok' : 'fail');
    if (selected === q.correct) correct++;
  });
  const pct = Math.round((correct / content.quiz.length) * 100);
  const pass = pct >= 70;
  const res = document.getElementById('quiz-result');
  res.style.display = 'block';
  res.className = 'quiz-result ' + (pass ? 'pass' : 'fail');
  res.textContent = pass
    ? `✓ Passed! ${correct}/${content.quiz.length} correct (${pct}%). +50 XP`
    : `✗ ${correct}/${content.quiz.length} correct (${pct}%). Need 70% to pass. Review the material and retry.`;

  if (pass && (state.quizScores[moduleId] || 0) < pct) {
    state.quizScores[moduleId] = pct;
    saveState();
    addXP(50, 'Quiz passed');
    updateModuleHeader();
  }
}

// ═══════════════════════════════════════════════════════
// TRACKER
// ═══════════════════════════════════════════════════════
function logSession() {
  const date = document.getElementById('f-date').value;
  const targets = parseInt(document.getElementById('f-targets').value);
  const hits = parseInt(document.getElementById('f-hits').value);
  const stage = document.getElementById('f-stage').value;
  const notes = document.getElementById('f-notes').value;
  if (!date || isNaN(targets) || isNaN(hits)) { showToast('Fill in date, targets, and hits'); return; }
  if (hits > targets) { showToast('Hits cannot exceed targets'); return; }
  state.sessions.unshift({ date, targets, hits, stage, notes, id: Date.now() });
  saveState();
  addXP(10, 'Session logged');
  renderTracker();
  document.getElementById('f-notes').value = '';
}

function deleteSession(id) {
  state.sessions = state.sessions.filter(s => s.id !== id);
  saveState();
  renderTracker();
}

function renderTracker() {
  const sessions = state.sessions;
  const total = sessions.reduce((a, s) => a + s.targets, 0);
  const totalHits = sessions.reduce((a, s) => a + s.hits, 0);
  const avg = sessions.length ? Math.round((totalHits / total) * 100) : 0;
  const best = sessions.length ? Math.max(...sessions.map(s => Math.round(s.hits / s.targets * 100))) : 0;

  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card"><div class="num">${sessions.length}</div><div class="lbl">Sessions</div></div>
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Targets Shot</div></div>
    <div class="stat-card"><div class="num">${avg}%</div><div class="lbl">Overall %</div></div>
    <div class="stat-card"><div class="num">${best}%</div><div class="lbl">Best Session</div></div>
  `;

  drawScoreChart(sessions);

  const list = document.getElementById('session-list');
  if (!sessions.length) { list.innerHTML = '<p style="color:var(--text-dim);font-size:.85rem">No sessions logged yet.</p>'; return; }
  list.innerHTML = sessions.map(s => {
    const pct = Math.round((s.hits / s.targets) * 100);
    const color = pct >= 90 ? 'var(--green)' : pct >= 75 ? 'var(--gold)' : pct >= 60 ? 'var(--orange)' : 'var(--red)';
    return `<div class="session-row">
      <div class="score" style="color:${color}">${s.hits}/${s.targets}</div>
      <div class="detail">${pct}% &nbsp;·&nbsp; ${s.stage} &nbsp;·&nbsp; ${s.date}</div>
      <div class="note">${s.notes || ''}</div>
      <button class="delete-btn" onclick="deleteSession(${s.id})">✕</button>
    </div>`;
  }).join('');

  // Set today's date default
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
}

function drawScoreChart(sessions) {
  const canvas = document.getElementById('score-chart');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth || 800;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const data = [...sessions].reverse().slice(-20);
  if (!data.length) return;
  const W = canvas.width, H = canvas.height;
  const pad = { top: 20, bottom: 30, left: 40, right: 20 };
  const gW = W - pad.left - pad.right;
  const gH = H - pad.top - pad.bottom;
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);
  // grid lines
  [60, 70, 80, 90, 100].forEach(pct => {
    const y = pad.top + gH - (pct - 50) / 50 * gH;
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#666'; ctx.font = '10px sans-serif'; ctx.fillText(pct + '%', 2, y + 4);
  });
  // bars
  const bw = Math.min(30, gW / data.length - 4);
  data.forEach((s, i) => {
    const pct = s.hits / s.targets;
    const bh = pct * gH;
    const x = pad.left + (i / data.length) * gW + (gW / data.length - bw) / 2;
    const y = pad.top + gH - bh;
    const color = pct >= .9 ? '#2ecc71' : pct >= .75 ? '#c9a227' : pct >= .6 ? '#e67e22' : '#e74c3c';
    ctx.fillStyle = color;
    ctx.fillRect(x, y, bw, bh);
    ctx.fillStyle = '#888'; ctx.font = '9px sans-serif';
    ctx.fillText(s.date.slice(5), x, H - 4);
  });
}

// ═══════════════════════════════════════════════════════

function renderRules() {
  document.getElementById('rules-content').innerHTML = RULES_DATA.map(r =>

// ═══════════════════════════════════════════════════════
// FIELD DIAGRAM
// ═══════════════════════════════════════════════════════
function drawField() {
  const canvas = document.getElementById('c-field');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#1e2a1e';
  ctx.fillRect(0, 0, W, H);

  // Bunker
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(W/2 - 120, H - 60, 240, 30);
  ctx.fillStyle = '#c9a227';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('BUNKER (15 machines)', W/2, H - 40);

  // Machines
  const mColors = ['#e74c3c','#3498db','#2ecc71'];
  [-2,-1,0,1,2].forEach((s, si) => {
    const sx = W/2 + s * 40;
    [-1,0,1].forEach((m, mi) => {
      ctx.fillStyle = mColors[mi];
      ctx.beginPath();
      ctx.arc(sx + m*10, H - 50, 4, 0, Math.PI*2);
      ctx.fill();
    });
  });

  // Shooting stations
  [-2,-1,0,1,2].forEach((s, si) => {
    const sx = W/2 + s * 44;
    ctx.fillStyle = '#c9a227';
    ctx.beginPath();
    ctx.arc(sx, 30, 14, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(si+1, sx, 35);
  });
  ctx.fillStyle = '#888';
  ctx.font = '10px sans-serif';
  ctx.fillText('← 2.5m → ← 2.5m →', W/2, 60);

  // Lines from stations toward bunker
  [-2,-1,0,1,2].forEach((s) => {
    ctx.strokeStyle = 'rgba(200,160,40,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W/2 + s*44, 44);
    ctx.lineTo(W/2 + s*40, H - 65);
    ctx.stroke();
  });

  // angle arcs from bunker
  const angles = [-45,-30,-15,0,15,30,45];
  angles.forEach(a => {
    const rad = (a - 90) * Math.PI / 180;
    ctx.strokeStyle = 'rgba(200,160,40,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W/2, H - 45);
    ctx.lineTo(W/2 + Math.cos(rad)*120, H - 45 + Math.sin(rad)*120);
    ctx.stroke();
  });
}

// ═══════════════════════════════════════════════════════
// BREATHING TOOL
// ═══════════════════════════════════════════════════════
let breathInterval = null;
function startBreathing() {
  const el = document.getElementById('breath-text');
  const btn = document.querySelector('.breath-btn');
  if (breathInterval) {
    clearInterval(breathInterval);
    breathInterval = null;
    el.style.display = 'none';
    btn.textContent = 'Start Box Breathing';
    return;
  }
  el.style.display = 'block';
  btn.textContent = 'Stop';
  const phases = [
    { text: 'INHALE', dur: 4000 },
    { text: 'HOLD', dur: 4000 },
    { text: 'EXHALE', dur: 4000 },
    { text: 'HOLD', dur: 4000 },
  ];
  let pi = 0;
  function next() {
    el.textContent = phases[pi].text + '...';
    pi = (pi + 1) % phases.length;
  }
  next();
  breathInterval = setInterval(next, 4000);
}

const origOpen = window.openLesson;
window.openLesson = function(id) {
  origOpen ? origOpen(id) : openLesson(id);
  if (id === 'mental') {
    setTimeout(() => {
      const learn = document.getElementById('tab-learn');
      if (learn && !learn.querySelector('.breath-btn')) {
        learn.innerHTML += `
          <div class="mental-tool">
            <h4>🫁 Box Breathing Practice</h4>
            <p>Use between stations or when feeling competitive pressure. 4-count inhale → 4-count hold → 4-count exhale → 4-count hold. Activates parasympathetic response.</p>
            <button class="breath-btn" onclick="startBreathing()">Start Box Breathing</button>
            <div id="breath-text"></div>
          </div>`;
      }
    }, 100);
  }
};
